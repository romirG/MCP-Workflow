metadata:
  title: Redfish API Endpoint Summary for Workflow Discovery
  description: This is a cleaned listing of all Redfish API endpoints for a server
    infrastructure management system (e.g., Dell iDRAC). Each endpoint is a low-level
    CRUD operation. Your task is to group these into 10-30 higher-level workflow tools.
  total_endpoints: 133
  total_resource_groups: 11
  resource_groups_list:
  - ''
  - AccountService
  - CertificateService
  - Chassis
  - EventService
  - Managers
  - SessionService
  - Systems
  - TaskService
  - TelemetryService
  - UpdateService
endpoints_by_resource_group:
