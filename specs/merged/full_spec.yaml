        Kafka: The destination follows the Kafka protocol for event notifications.
        OEM: The destination follows an OEM protocol for event notifications.
        Redfish: The destination follows the Redfish Specification for event notifications.
        SMTP: The destination follows the SMTP specification for event notifications.
        SNMPv1: The destination follows the SNMPv1 protocol for event notifications.
        SNMPv2c: The destination follows the SNMPv2c protocol for event notifications.
        SNMPv3: The destination follows the SNMPv3 protocol for event notifications.
        SyslogRELP: The destination follows syslog RELP for event notifications.
        SyslogTCP: The destination follows syslog TCP-based transport for event notifications.
        SyslogTLS: The destination follows syslog TLS-based transport for event notifications.
        SyslogUDP: The destination follows syslog UDP-based transport for event notifications.
      x-enumLongDescriptions:
        Kafka: This value shall indicate the destination follows the Apache-defined
          Kafka protocol as defined by the Kafka Protocol Guide.  The `Context` property
          shall contain the Kafka topic of the destination broker.
        OEM: This value shall indicate an OEM-specific protocol.  The `OEMProtocol`
          property shall contain the specific OEM event destination protocol.
        Redfish: This value shall indicate the destination follows the Redfish Specification
          for event notifications.  Destinations requesting `EventFormatType` of `Event`
          shall receive a Redfish resource of type `Event`.  Destinations requesting
          `EventFormatType` of `MetricReport` shall receive a Redfish resource of
          type `MetricReport`.
        SMTP: This value shall indicate the destination follows the RFC5321-defined
          SMTP specification.
        SNMPv1: This value shall indicate the destination follows the RFC1157-defined
          SNMPv1 protocol.
        SNMPv2c: This value shall indicate the destination follows the SNMPv2c protocol
          as defined by RFC1441 and RFC1452.
        SNMPv3: This value shall indicate the destination follows the SNMPv3 protocol
          as defined by RFC3411 and RFC3418.
        SyslogRELP: This value shall indicate the destination follows the Reliable
          Event Logging Protocol (RELP) transport for syslog as defined by www.rsyslog.com.
        SyslogTCP: This value shall indicate the destination follows the TCP-based
          transport for syslog as defined in RFC6587.
        SyslogTLS: This value shall indicate the destination follows the TLS-based
          transport for syslog as defined in RFC5424.
        SyslogUDP: This value shall indicate the destination follows the UDP-based
          transport for syslog as defined in RFC5424.
