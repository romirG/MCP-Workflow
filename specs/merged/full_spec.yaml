            status code to reject the request.
        DecommissionTypes:
          description: The types of data to remove from the system.
          items:
            $ref: '#/components/schemas/ComputerSystem_v1_22_2_DecommissionType'
          type: array
          x-longDescription: This parameter shall contain a list of the types of data
            to remove from the system.
        OEMDecommissionTypes:
          description: The OEM-specific types of data to remove from the system.
          items:
            type: string
          type: array
          x-longDescription: This parameter shall contain any OEM-specific types of
            data to remove from the system.
        RequireSecureErase:
          description: Ensure secure erasure of all devices and fail the request if
            not possible.
          type: boolean
          x-longDescription: This parameter shall indicate if a secure erase is required.  If
            the parameter contains `true` and a secure erase to the level of NIST
            800-88 Clear or Purge for all specified components cannot be performed
            the service shall return the HTTP `501 Not Implemented` status code.  This
            failure may occur after the process has already started.  If not provided
            by the client, the value shall be assumed to be `false`.
      required:
      - DecommissionTypes
      type: object
      x-longDescription: This action shall remove all specified data from a system
        in preparation to decommission the system.
    ComputerSystem_v1_22_2_DecommissionType:
      enum:
      - All
      - UserData
      - ManagerConfig
      - BIOSConfig
      - NetworkConfig
      - StorageConfig
      - Logs
      type: string
      x-enumDescriptions:
        All: Remove all possible data from the server.
        BIOSConfig: Reset all BIOS settings to factory defaults.
        Logs: Clear all logs.
        ManagerConfig: Reset all manager settings to factory defaults.
        NetworkConfig: Reset all network settings to factory defaults.
        StorageConfig: Reset all storage controller settings to factory defaults.  This
          will leave the user data intact unless that is also specified.
        UserData: Remove all possible data from block devices and other user or operating
          system accessible storage attached to the system.
      x-enumLongDescriptions:
        All: This value shall indicate the service removes all the data that it can
          from the system.  This shall include all possible OEM data as well.
        BIOSConfig: This value shall indicate the service resets all BIOS settings
          to factory defaults.  This shall be equivalent to performing the `ResetBios`
          action on each `Bios` resource.
        Logs: This value shall indicate the service clears all logs.  This shall be
          equivalent to performing the `ClearLog` action on each `LogService` resource.
        ManagerConfig: This value shall indicate the service resets all associated
          managers to factory defaults.  This shall be equivalent to performing the
          `ResetToDefaults` action on each `Manager` resource with the `ResetType`
          parameter of `ResetAll`.
        NetworkConfig: This value shall indicate the service resets all network settings
          on all network devices to factory defaults.
        StorageConfig: This value shall indicate the service resets all storage controller
          settings to factory defaults.  This shall be equivalent to performing the
          `ResetToDefaults` action on each `Storage` resource with the `ResetType`
          parameter of `PreserveVolumes`.
        UserData: This value shall indicate the service removes all the data from
          block devices or other operating system accessible storage.  If the `RequireSecureErase`
          parameter contains `true`, this shall be equivalent to performing the SecureErase
          action on each drive.
