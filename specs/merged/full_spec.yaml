openapi: 3.0.3
info:
  title: Redfish API - Server Infrastructure Management
  description: Consolidated DMTF Redfish API specification for server infrastructure
    management. Covers systems, chassis, managers (BMC/iDRAC), storage, networking,
    firmware, events, and telemetry. Designed for use with Prism mock server.
  version: '2024.3'
  contact:
    name: DMTF Redfish Forum
    url: https://www.dmtf.org/standards/redfish
servers:
- url: http://localhost:4000
  description: Prism Mock Server (local)
- url: https://{host}
  description: Live iDRAC/BMC
  variables:
    host:
      default: 192.168.1.100
      description: iDRAC/BMC IP address
