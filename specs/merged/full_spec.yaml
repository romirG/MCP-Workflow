    Chassis_v1_25_1_DoorState:
      enum:
      - Locked
      - Closed
      - LockedAndOpen
      - Open
      type: string
      x-enumDescriptions:
        Closed: Door is closed.
        Locked: Door is closed and locked.
        LockedAndOpen: Door is open and locked.
        Open: Door is open.
      x-enumLongDescriptions:
        Closed: This value shall indicate that the door is closed but unlocked.
        Locked: This value shall indicate that the door is both closed and locked.  In
          this state, the door cannot be opened unless the value of the `Locked` property
          is set to `false`.
        LockedAndOpen: This value shall indicate that the door is open but the lock
          has been engaged.  It may be possible to close the door while in this state.
        Open: This value shall indicate that the door is open.
