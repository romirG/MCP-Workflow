    ComputerSystem_v1_22_2_BootProgressTypes:
      enum:
      - None
      - PrimaryProcessorInitializationStarted
      - BusInitializationStarted
      - MemoryInitializationStarted
      - SecondaryProcessorInitializationStarted
      - PCIResourceConfigStarted
      - SystemHardwareInitializationComplete
      - SetupEntered
      - OSBootStarted
      - OSRunning
      - OEM
      type: string
      x-enumDescriptions:
        BusInitializationStarted: The system has started initializing the buses.
        MemoryInitializationStarted: The system has started initializing the memory.
        None: The system is not booting.
        OEM: A boot progress state in an OEM-defined format.
        OSBootStarted: The operating system has started booting.
        OSRunning: The operating system is running.
        PCIResourceConfigStarted: The system has started initializing the PCI resources.
        PrimaryProcessorInitializationStarted: The system has started initializing
          the primary processor.
        SecondaryProcessorInitializationStarted: The system has started initializing
          the remaining processors.
        SetupEntered: The system has entered the setup utility.
        SystemHardwareInitializationComplete: The system has completed initializing
          all hardware.
      x-enumLongDescriptions:
        BusInitializationStarted: This value shall indicate that the system has started
          to initialize the buses.
        MemoryInitializationStarted: This value shall indicate that the system has
          started to initialize the memory.
        None: This value shall indicate that the system is not booting or running,
          such as the system is powered off.
        OEM: This value shall indicate an OEM-defined boot progress state.
        OSBootStarted: This value shall indicate that the operating system has started
          to boot.
        OSRunning: This value shall indicate that the operating system is running
          and shall indicate the final boot progress state.
        PCIResourceConfigStarted: This value shall indicate that the system has started
          to initialize the PCI resources.
        PrimaryProcessorInitializationStarted: This value shall indicate that the
          system has started to initialize the primary processor.
        SecondaryProcessorInitializationStarted: This value shall indicate that the
          system has started to initialize the secondary processors.
        SetupEntered: This value shall indicate that the system has entered the setup
          utility.
        SystemHardwareInitializationComplete: This value shall indicate that the system
          has completed initializing all hardware.
      x-enumVersionAdded:
        SetupEntered: v1_15_0
