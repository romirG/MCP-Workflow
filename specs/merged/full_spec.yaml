    LogService_v1_7_0_AutoClearResolvedEntries:
      enum:
      - ClearEventGroup
      - RetainCauseResolutionEntries
      - UpdateCauseEntry
      - None
      type: string
      x-enumDescriptions:
        ClearEventGroup: Automatically clears all resolved log entries and other entries
          within the same `EventGroupId`.
        None: Do not automatically clear the resolved log entries.
        RetainCauseResolutionEntries: Retains log entries of the original cause and
          the final resolution, but automatically clears other entries containing
          the intermediate results within the same `EventGroupId`.
        UpdateCauseEntry: Updates log entries of the original cause, but automatically
          clears other entries within the same `EventGroupId`.
      x-enumLongDescriptions:
        ClearEventGroup: This value shall indicate this log service automatically
          clears all log entries that contain the value `true` for the `Resolved`
          property and other entries within the same `EventGroupId`.
        None: This value shall indicate this log service does not automatically clear
          the resolved log entries.
        RetainCauseResolutionEntries: This value shall indicate this log service retains
          the entries containing the original cause and the final resolution, but
          automatically clears other entries containing the intermediate results within
          the same `EventGroupId`.  For example, the original cause of a fan failure
          is indicated by an entry containing the `FanFailed` message key in the `MessageId`
          property, followed by the entries containing `FanRemoved` and `FanInserted`
          message keys corresponding to user actions.  Finally, an entry showing the
          fan failure is repaired with `FanRestored` message key in the `MessageId`
          property.  In this case, the entries with `FanFailed` and `FanRestored`
          message keys are retained, but other entries within the same `EventGroupId`
          are automatically cleared.
        UpdateCauseEntry: This value shall indicate this log service updates the entry
          containing the original cause for the repaired status, but automatically
          clears other entries within the same `EventGroupId`.  For example, the original
          cause of a fan failure is indicated by an entry containing `FanFailed` message
          key in the `MessageId` property, followed by the entries containing `FanRemoved`
          and `FanInserted` message keys corresponding to user actions.  Finally,
          an entry showing the fan failure is repaired with `FanRestored` message
          key in the `MessageId` property.  In this case, the entry with `FanFailed`
          message key is updated to show the repaired status, such as updating the
          value of Resolved property to `true` and the timestamp contained by the
          `Modified` property, but other entries within the same `EventGroupId` are
          automatically cleared.
