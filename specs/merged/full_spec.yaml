          the value may be reported as a negative number or may report a value of
          zero.
        Zero: This value shall indicate a reading with zero as its reference point.
    Sensor_v1_9_1_ReadingType:
      enum:
      - Temperature
      - Humidity
      - Power
      - EnergykWh
      - EnergyJoules
      - EnergyWh
      - ChargeAh
      - Voltage
      - Current
      - Frequency
      - Pressure
      - PressurekPa
      - PressurePa
      - LiquidLevel
      - Rotational
