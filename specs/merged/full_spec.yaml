    ComputerSystem_v1_22_2_PowerMode:
      enum:
      - MaximumPerformance
      - BalancedPerformance
      - PowerSaving
      - Static
      - OSControlled
      - OEM
      - EfficiencyFavorPower
      - EfficiencyFavorPerformance
      type: string
      x-enumDescriptions:
        BalancedPerformance: The system performs at the highest speeds while utilization
          is high and performs at reduced speeds when the utilization is low.
        EfficiencyFavorPerformance: The system performs at reduced speeds at all utilizations
          to save power while attempting to maintain performance.  This mode differs
          from `EfficiencyFavorPower` in that more performance is retained but less
          power is saved.
        EfficiencyFavorPower: The system performs at reduced speeds at all utilizations
          to save power at the cost of performance.  This mode differs from `PowerSaving`
          in that more performance is retained and less power is saved.  This mode
          differs from `EfficiencyFavorPerformance` in that less performance is retained
          but more power is saved.
        MaximumPerformance: The system performs at the highest speeds possible.
        OEM: The system power mode is OEM-defined.
        OSControlled: The system power mode is controlled by the operating system.
        PowerSaving: The system performs at reduced speeds to save power.
        Static: The system power mode is static.
      x-enumLongDescriptions:
        BalancedPerformance: This value shall indicate the system performs at the
          highest speeds possible when the utilization is high and performs at reduced
          speeds when the utilization is low to save power.  This mode is a compromise
          between `MaximumPerformance` and `PowerSaving`.
        EfficiencyFavorPerformance: This value shall indicate the system performs
          at reduced speeds at all utilizations to save power while attempting to
          maintain performance.  This mode differs from `EfficiencyFavorPower` in
          that more performance is retained but less power is saved. This mode differs
          from 'MaximumPerformance' in that power is saved at the cost of some performance.  This
          mode differs from 'BalancedPerformance' in that power saving occurs at all
          utilizations.
        EfficiencyFavorPower: This value shall indicate the system performs at reduced
          speeds at all utilizations to save power at the cost of performance.  This
          mode differs from `PowerSaving` in that more performance is retained and
          less power is saved.  This mode differs from `EfficiencyFavorPerformance`
          in that less performance is retained but more power is saved. This mode
          differs from 'BalancedPerformance' in that power saving occurs at all utilizations.
        MaximumPerformance: This value shall indicate the system performs at the highest
          speeds possible.  This mode should be used when performance is the top priority.
        OEM: This value shall indicate the system performs at an OEM-defined power
          mode.
        OSControlled: This value shall indicate the system performs at an operating
          system-controlled power mode.
        PowerSaving: This value shall indicate the system performs at reduced speeds
          to save power.  This mode should be used when power saving is the top priority.
        Static: This value shall indicate the system performs at a static base speed.
      x-enumVersionAdded:
        EfficiencyFavorPerformance: v1_22_0
        EfficiencyFavorPower: v1_22_0
