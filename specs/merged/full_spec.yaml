      - PCIeSlotLowProfile
      - PCIeHalfLength
      - OEM
      type: string
      x-enumDescriptions:
        Drive2_5: A 2.5 inch drive.
        Drive3_5: A 3.5 inch drive.
        EDSFF: An EDSFF drive.
        EDSFF_1U_Long: An EDSFF 1U Long (E1.L) drive.
        EDSFF_1U_Short: An EDSFF 1U Short (E1.S) drive.
        EDSFF_E3_Long: An EDSFF E3 Long (E3.L) drive.
        EDSFF_E3_Short: An EDSFF E3 Short (E3.S) drive.
        M2: An M.2 drive.
        M2_22110: An M.2 22110 drive.
        M2_2230: An M.2 2230 drive.
        M2_2242: An M.2 2242 drive.
        M2_2260: An M.2 2260 drive.
        M2_2280: An M.2 2280 drive.
        OEM: An OEM-defined form factor.
        PCIeHalfLength: A half-length PCIe add-in card.
        PCIeSlotFullLength: A full-length PCIe add-in card.
        PCIeSlotLowProfile: A low-profile PCIe add-in card.
        U2: A U.2 drive.
      x-enumLongDescriptions:
        Drive2_5: This value shall indicate the drive is approximately 2.5 inches
          in width and no more than 0.8 inches in height and is not a U.2 drive.
        Drive3_5: This value shall indicate the drive is approximately 3.5 inches
          in width and no more than 1.1 inches in height.
        EDSFF: This value shall indicate the drive corresponds to one of SNIA's SFF
          specifications with an unspecified form factor.  The SlotFormFactor property
          should not contain this value.
        EDSFF_1U_Long: This value shall indicate the drive corresponds to the SFF-TA-1007
          Specification.
        EDSFF_1U_Short: This value shall indicate the drive corresponds to the SFF-TA-1006
          Specification.
        EDSFF_E3_Long: This value shall indicate the drive corresponds to the SFF-TA-1008
          Specification and is approximately 142.2 mm in length.
        EDSFF_E3_Short: This value shall indicate the drive corresponds to the SFF-TA-1008
          Specification and is approximately 112.75 mm in length.
        M2: This value shall indicate the drive corresponds to the PCI Express M.2
          Specification with an unspecified form factor.  The SlotFormFactor property
          should not contain this value.
        M2_22110: This value shall indicate the drive corresponds to the PCI Express
          M.2 Specification and is approximately 22 mm in width and 110 mm in length.
        M2_2230: This value shall indicate the drive corresponds to the PCI Express
          M.2 Specification and is approximately 22 mm in width and 30 mm in length.
        M2_2242: This value shall indicate the drive corresponds to the PCI Express
          M.2 Specification and is approximately 22 mm in width and 42 mm in length.
        M2_2260: This value shall indicate the drive corresponds to the PCI Express
          M.2 Specification and is approximately 22 mm in width and 60 mm in length.
        M2_2280: This value shall indicate the drive corresponds to the PCI Express
          M.2 Specification and is approximately 22 mm in width and 80 mm in length.
        OEM: This value shall indicate the drive is an OEM-defined form factor.
        PCIeHalfLength: This value shall indicate the drive is an add-in card less
          than 7 inches in length.
        PCIeSlotFullLength: This value shall indicate the drive is an add-in card
          greater than 7 inches in length.
        PCIeSlotLowProfile: This value shall indicate the drive is an add-in card
          less than 2.5 inches in height.
        U2: This value shall indicate the drive corresponds to the PCI Express SFF-8639
          Module Specification.
      x-enumVersionAdded:
        EDSFF: v1_18_0
        M2: v1_18_0
    Drive_v1_18_0_HotspareReplacementModeType:
