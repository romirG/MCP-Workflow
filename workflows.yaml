- name: firmware_update
  category: maintenance
  description: Check installed firmware/software versions, trigger a firmware update
    from a URI, and poll the resulting task to completion. If the target component
    is already at the desired version, the update is skipped.
  parameters:
  - name: ImageURI
    type: string
    required: false
    description: URI of the firmware image to apply.
  - name: TargetVersion
    type: string
    required: false
    description: Desired version used to decide whether an update is needed.
  - name: SoftwareId
    type: string
    required: false
    description: Specific inventory entry to inspect.
  - name: TaskId
    type: string
    required: false
    description: Task to poll (populated from the update response).
  steps:
  - step_id: get_update_service
    description: Read update service capabilities.
    action: GET
    endpoint: /redfish/v1/UpdateService
    extract:
      service_state: $.Status.State
      push_uri: $.HttpPushUri
  - step_id: list_firmware
    description: List installed firmware.
    action: GET
    endpoint: /redfish/v1/UpdateService/FirmwareInventory
    extract:
      firmware_members: $.Members[*].@odata.id
  - step_id: get_firmware_item
    description: Read each firmware entry's version.
    action: GET
    endpoint: /redfish/v1/UpdateService/FirmwareInventory/{SoftwareId}
    loop_over: firmware_members
    loop_variable: SoftwareId
    on_error: continue
    extract:
      current_version: $.Version
      fw_name: $.Name
  - step_id: list_software
    description: List installed software.
    action: GET
    endpoint: /redfish/v1/UpdateService/SoftwareInventory
    extract:
      software_members: $.Members[*].@odata.id
  - step_id: get_software_item
    description: Read each software entry.
    action: GET
    endpoint: /redfish/v1/UpdateService/SoftwareInventory/{SoftwareId}
    loop_over: software_members
    loop_variable: SoftwareId
    on_error: continue
    extract:
      sw_version: $.Version
  - step_id: configure_update_service
    description: Optionally adjust update service settings before updating.
    action: PATCH
    endpoint: /redfish/v1/UpdateService
    on_error: continue
    condition:
      if: configure_requested == true
      then: continue
      else: skip
    request_body:
      HttpPushUriTargetsBusy: false
  - step_id: trigger_update
    description: Trigger the update only if the current version differs from the target;
      otherwise skip to reporting.
    action: POST
    endpoint: /redfish/v1/UpdateService/Actions/UpdateService.SimpleUpdate
    condition:
      if: current_version != TargetVersion
      then: continue
      else: goto:report
    request_body:
      ImageURI: '{ImageURI}'
    on_error: stop
    extract:
      TaskId: $.Id
      task_uri: $.@odata.id
  - step_id: poll_task
    description: Poll the update task until it completes.
    action: GET
    endpoint: /redfish/v1/TaskService/Tasks/{TaskId}
    on_error: continue
    extract:
      task_state: $.TaskState
      task_percent: $.PercentComplete
  - step_id: report
    description: Final reporting step (jump target when no update is needed).
    action: GET
    endpoint: /redfish/v1/UpdateService/FirmwareInventory
    extract:
      final_members: $.Members@odata.count
  raw_endpoints:
  - GET /redfish/v1/UpdateService
  - PATCH /redfish/v1/UpdateService
  - POST /redfish/v1/UpdateService/Actions/UpdateService.SimpleUpdate
  - GET /redfish/v1/UpdateService/FirmwareInventory
  - GET /redfish/v1/UpdateService/FirmwareInventory/{SoftwareId}
  - GET /redfish/v1/UpdateService/SoftwareInventory
  - GET /redfish/v1/UpdateService/SoftwareInventory/{SoftwareId}
  - GET /redfish/v1/TaskService/Tasks/{TaskId}
  output_template: '## Firmware Update

    | Property | Value |

    |----------|-------|

    | Current Version | {current_version} |

    | Target Version | {TargetVersion} |

    | Task State | {task_state} |

    | Percent Complete | {task_percent} |'
  next_workflows:
  - workflow: task_management
    if: TaskId != null
    reason: Hand off to task management to monitor or cancel the update task.
- name: network_configuration
  category: configuration
  description: 'View and modify network settings on both the host system and the BMC:
    system and manager Ethernet interfaces, plus BMC network protocol services (HTTPS,
    SSH, IPMI).'
  parameters:
  - name: SystemId
    type: string
    required: false
    description: Target system for host NIC config.
  - name: ManagerId
    type: string
    required: false
    description: Target manager for BMC NIC config.
  - name: InterfaceId
    type: string
    required: false
    description: Specific Ethernet interface to modify.
  steps:
  - step_id: list_system_nics
    description: List system Ethernet interfaces.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/EthernetInterfaces
    extract:
      sys_nic_members: $.Members[*].@odata.id
  - step_id: get_system_nic
    description: Read each system Ethernet interface.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/EthernetInterfaces/{InterfaceId}
    loop_over: sys_nic_members
    loop_variable: InterfaceId
    on_error: continue
    extract:
      mac: $.MACAddress
      ipv4: $.IPv4Addresses[*].Address
  - step_id: modify_system_nic
    description: Modify a system Ethernet interface if requested.
    action: PATCH
    endpoint: /redfish/v1/Systems/{SystemId}/EthernetInterfaces/{InterfaceId}
    on_error: stop
    condition:
      if: modify_system_nic == true
      then: continue
      else: skip
    request_body:
      DHCPv4:
        DHCPEnabled: '{dhcp_enabled}'
  - step_id: list_manager_nics
    description: List manager (BMC) Ethernet interfaces.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/EthernetInterfaces
    extract:
      mgr_nic_members: $.Members[*].@odata.id
  - step_id: get_manager_nic
    description: Read each manager Ethernet interface.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/EthernetInterfaces/{InterfaceId}
    loop_over: mgr_nic_members
    loop_variable: InterfaceId
    on_error: continue
    extract:
      mgr_mac: $.MACAddress
      mgr_ipv4: $.IPv4Addresses[*].Address
  - step_id: modify_manager_nic
    description: Modify a manager Ethernet interface if requested.
    action: PATCH
    endpoint: /redfish/v1/Managers/{ManagerId}/EthernetInterfaces/{InterfaceId}
    on_error: stop
    condition:
      if: modify_manager_nic == true
      then: continue
      else: skip
    request_body:
      IPv4StaticAddresses: '{static_addresses}'
  - step_id: get_network_protocol
    description: Read BMC network protocol/service settings.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/NetworkProtocol
    extract:
      ssh_enabled: $.SSH.ProtocolEnabled
      https_port: $.HTTPS.Port
  - step_id: modify_network_protocol
    description: Enable/disable protocols or change ports.
    action: PATCH
    endpoint: /redfish/v1/Managers/{ManagerId}/NetworkProtocol
    on_error: stop
    condition:
      if: modify_protocol == true
      then: continue
      else: skip
    request_body:
      SSH:
        ProtocolEnabled: '{ssh_flag}'
  raw_endpoints:
  - GET /redfish/v1/Systems/{SystemId}/EthernetInterfaces
  - GET /redfish/v1/Systems/{SystemId}/EthernetInterfaces/{InterfaceId}
  - PATCH /redfish/v1/Systems/{SystemId}/EthernetInterfaces/{InterfaceId}
  - GET /redfish/v1/Managers/{ManagerId}/EthernetInterfaces
  - GET /redfish/v1/Managers/{ManagerId}/EthernetInterfaces/{InterfaceId}
  - PATCH /redfish/v1/Managers/{ManagerId}/EthernetInterfaces/{InterfaceId}
  - GET /redfish/v1/Managers/{ManagerId}/NetworkProtocol
  - PATCH /redfish/v1/Managers/{ManagerId}/NetworkProtocol
  output_template: '## Network Configuration

    | Property | Value |

    |----------|-------|

    | System NIC MAC | {mac} |

    | Manager NIC MAC | {mgr_mac} |

    | SSH Enabled | {ssh_enabled} |'
- name: bmc_manager_operations
  category: maintenance
  description: 'Manage the BMC/iDRAC management controller itself: read manager details,
    update settings, reboot the BMC, or reset it to factory defaults.'
  parameters:
  - name: ManagerId
    type: string
    required: false
    description: Target manager identifier.
    default: first member of /redfish/v1/Managers
  - name: ResetType
    type: string
    required: false
    description: Manager reset type (GracefulRestart, ForceRestart).
    default: GracefulRestart
  steps:
  - step_id: list_managers
    description: List management controllers.
    action: GET
    endpoint: /redfish/v1/Managers
    extract:
      manager_members: $.Members[*].@odata.id
  - step_id: get_manager
    description: Read the target manager.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}
    extract:
      firmware_version: $.FirmwareVersion
      manager_type: $.ManagerType
      mgr_health: $.Status.Health
  - step_id: patch_manager
    description: Update manager settings (e.g., datetime) if requested.
    action: PATCH
    endpoint: /redfish/v1/Managers/{ManagerId}
    on_error: continue
    condition:
      if: modify_requested == true
      then: continue
      else: skip
    request_body:
      DateTime: '{datetime}'
  - step_id: reset_manager
    description: Reboot the BMC if requested.
    action: POST
    endpoint: /redfish/v1/Managers/{ManagerId}/Actions/Manager.Reset
    condition:
      if: reset_requested == true
      then: continue
      else: skip
    request_body:
      ResetType: '{ResetType}'
    on_error: stop
  - step_id: reset_to_defaults
    description: Reset the BMC to factory defaults if explicitly requested.
    action: POST
    endpoint: /redfish/v1/Managers/{ManagerId}/Actions/Manager.ResetToDefaults
    condition:
      if: factory_reset_requested == true
      then: continue
      else: skip
    request_body:
      ResetType: '{factory_reset_type}'
    on_error: stop
  raw_endpoints:
  - GET /redfish/v1/Managers
  - GET /redfish/v1/Managers/{ManagerId}
  - PATCH /redfish/v1/Managers/{ManagerId}
  - POST /redfish/v1/Managers/{ManagerId}/Actions/Manager.Reset
  - POST /redfish/v1/Managers/{ManagerId}/Actions/Manager.ResetToDefaults
  output_template: '## BMC Manager: {ManagerId}

    | Property | Value |

    |----------|-------|

    | Firmware Version | {firmware_version} |

    | Type | {manager_type} |

    | Health | {mgr_health} |'
- name: user_account_management
  category: security
  description: 'Manage local user accounts and roles: read account service policy,
    list/create/modify/delete accounts, and inspect role definitions and privileges.'
  parameters:
  - name: AccountId
    type: string
    required: false
    description: Account to read, modify, or delete.
  - name: RoleId
    type: string
    required: false
    description: Role to inspect.
  steps:
  - step_id: get_account_service
    description: Read account service policy (lockout, password rules).
    action: GET
    endpoint: /redfish/v1/AccountService
    extract:
      min_pw_length: $.MinPasswordLength
      lockout_threshold: $.AccountLockoutThreshold
  - step_id: configure_account_service
    description: Update account policy if requested.
    action: PATCH
    endpoint: /redfish/v1/AccountService
    on_error: continue
    condition:
      if: configure_policy == true
      then: continue
      else: skip
    request_body:
      AccountLockoutThreshold: '{lockout_threshold}'
  - step_id: list_accounts
    description: List user accounts.
    action: GET
    endpoint: /redfish/v1/AccountService/Accounts
    extract:
      account_members: $.Members[*].@odata.id
  - step_id: get_account
    description: Read each account.
    action: GET
    endpoint: /redfish/v1/AccountService/Accounts/{AccountId}
    loop_over: account_members
    loop_variable: AccountId
    on_error: continue
    extract:
      username: $.UserName
      role: $.RoleId
      enabled: $.Enabled
  - step_id: create_account
    description: Create a new account if requested.
    action: POST
    endpoint: /redfish/v1/AccountService/Accounts
    condition:
      if: create_requested == true
      then: continue
      else: skip
    request_body:
      UserName: '{new_username}'
      Password: '{new_password}'
      RoleId: '{new_role}'
      Enabled: true
    extract:
      new_account_uri: $.@odata.id
  - step_id: modify_account
    description: Modify an account (role, enable/disable, password) if requested.
    action: PATCH
    endpoint: /redfish/v1/AccountService/Accounts/{AccountId}
    on_error: stop
    condition:
      if: modify_requested == true
      then: continue
      else: skip
    request_body:
      RoleId: '{updated_role}'
      Enabled: '{enabled_flag}'
  - step_id: delete_account
    description: Delete an account if requested.
    action: DELETE
    endpoint: /redfish/v1/AccountService/Accounts/{AccountId}
    on_error: stop
    condition:
      if: delete_requested == true
      then: continue
      else: skip
  - step_id: list_roles
    description: List available roles.
    action: GET
    endpoint: /redfish/v1/AccountService/Roles
    extract:
      role_members: $.Members[*].@odata.id
  - step_id: get_role
    description: Read each role's privileges.
    action: GET
    endpoint: /redfish/v1/AccountService/Roles/{RoleId}
    loop_over: role_members
    loop_variable: RoleId
    on_error: continue
    extract:
      assigned_privileges: $.AssignedPrivileges
  raw_endpoints:
  - GET /redfish/v1/AccountService
  - PATCH /redfish/v1/AccountService
  - GET /redfish/v1/AccountService/Accounts
  - POST /redfish/v1/AccountService/Accounts
  - GET /redfish/v1/AccountService/Accounts/{AccountId}
  - PATCH /redfish/v1/AccountService/Accounts/{AccountId}
  - DELETE /redfish/v1/AccountService/Accounts/{AccountId}
  - GET /redfish/v1/AccountService/Roles
  - GET /redfish/v1/AccountService/Roles/{RoleId}
  output_template: '## User Accounts

    | Account | Role | Enabled |

    |---------|------|---------|

    | {username} | {role} | {enabled} |'
