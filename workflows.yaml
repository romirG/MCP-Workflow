    extract:
      log_service_name: $.Name
      overwrite_policy: $.OverWritePolicy
  - step_id: list_system_log_entries
    description: List entries for a system log service.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}/Entries
    on_error: continue
    extract:
      entry_members: $.Members[*].@odata.id
      entry_count: $.Members@odata.count
  - step_id: get_system_log_entry
    description: Read a specific system log entry.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}/Entries/{EntryId}
    on_error: continue
    extract:
      entry_message: $.Message
      entry_severity: $.Severity
  - step_id: clear_system_log
    description: Clear the system log only if explicitly requested.
    action: POST
    endpoint: /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}/Actions/LogService.ClearLog
    condition:
      if: clear_requested == true
      then: continue
      else: skip
    on_error: stop
  - step_id: list_manager_logs
    description: List manager log services.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/LogServices
    on_error: continue
    extract:
      mgr_logsvc_members: $.Members[*].@odata.id
  - step_id: get_manager_log_service
    description: Read each manager log service.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/LogServices/{LogServiceId}
    loop_over: mgr_logsvc_members
    loop_variable: LogServiceId
    on_error: continue
    extract:
      mgr_log_name: $.Name
  - step_id: list_manager_log_entries
    description: List manager log entries.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/LogServices/{LogServiceId}/Entries
    on_error: continue
    extract:
      mgr_entry_members: $.Members[*].@odata.id
  - step_id: get_manager_log_entry
    description: Read a specific manager log entry.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/LogServices/{LogServiceId}/Entries/{EntryId}
    on_error: continue
    extract:
      mgr_entry_message: $.Message
  - step_id: list_chassis_logs
    description: List chassis log services.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/LogServices
    on_error: continue
    extract:
      chassis_logsvc_members: $.Members[*].@odata.id
  raw_endpoints:
  - GET /redfish/v1/Systems/{SystemId}/LogServices
  - GET /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}
  - GET /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}/Entries
  - GET /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}/Entries/{EntryId}
  - POST /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}/Actions/LogService.ClearLog
  - GET /redfish/v1/Managers/{ManagerId}/LogServices
  - GET /redfish/v1/Managers/{ManagerId}/LogServices/{LogServiceId}
  - GET /redfish/v1/Managers/{ManagerId}/LogServices/{LogServiceId}/Entries
  - GET /redfish/v1/Managers/{ManagerId}/LogServices/{LogServiceId}/Entries/{EntryId}
  - GET /redfish/v1/Chassis/{ChassisId}/LogServices
  output_template: '## Log Collection

    | Source | Entries |

    |--------|---------|

    | System Log | {entry_count} |

    | Last Severity | {entry_severity} |'
- name: certificate_management
  category: security
  description: 'Manage TLS certificates: read the certificate service, view and delete
    manager certificates, generate a CSR, and replace an existing certificate.'
  parameters:
  - name: ManagerId
    type: string
    required: false
    description: Manager whose certificates to manage.
  - name: CertificateId
    type: string
    required: false
    description: Certificate to view or delete.
  steps:
  - step_id: get_cert_service
    description: Read certificate service.
    action: GET
    endpoint: /redfish/v1/CertificateService
    extract:
      csr_action: $.Actions.['#CertificateService.GenerateCSR'].target
  - step_id: list_manager_certs
    description: List certificates on the manager.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/Certificates
    extract:
      cert_members: $.Members[*].@odata.id
  - step_id: get_manager_cert
    description: Read each certificate.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/Certificates/{CertificateId}
    loop_over: cert_members
    loop_variable: CertificateId
    on_error: continue
    extract:
      subject: $.Subject.CommonName
      valid_not_after: $.ValidNotAfter
  - step_id: generate_csr
    description: Generate a CSR if requested.
    action: POST
    endpoint: /redfish/v1/CertificateService/Actions/CertificateService.GenerateCSR
    condition:
      if: csr_requested == true
      then: continue
      else: skip
    request_body:
      CommonName: '{common_name}'
      Organization: '{org}'
      CertificateCollection: '{cert_collection_uri}'
    extract:
      csr_string: $.CSRString
  - step_id: replace_certificate
    description: Replace an existing certificate if requested.
    action: POST
    endpoint: /redfish/v1/CertificateService/Actions/CertificateService.ReplaceCertificate
    condition:
      if: replace_requested == true
      then: continue
      else: skip
    request_body:
      CertificateUri: '{certificate_uri}'
      CertificateString: '{certificate_string}'
      CertificateType: PEM
  - step_id: delete_certificate
    description: Delete a certificate if requested.
    action: DELETE
    endpoint: /redfish/v1/Managers/{ManagerId}/Certificates/{CertificateId}
    on_error: stop
    condition:
      if: delete_requested == true
      then: continue
      else: skip
  raw_endpoints:
  - GET /redfish/v1/CertificateService
  - POST /redfish/v1/CertificateService/Actions/CertificateService.GenerateCSR
  - POST /redfish/v1/CertificateService/Actions/CertificateService.ReplaceCertificate
  - GET /redfish/v1/Managers/{ManagerId}/Certificates
  - GET /redfish/v1/Managers/{ManagerId}/Certificates/{CertificateId}
  - DELETE /redfish/v1/Managers/{ManagerId}/Certificates/{CertificateId}
  output_template: '## Certificates

    | Property | Value |

    |----------|-------|

    | Subject | {subject} |

    | Valid Until | {valid_not_after} |'
- name: virtual_media_operations
  category: lifecycle
  description: Mount and unmount virtual media (ISO images) on either the system or
    the manager, e.g. to boot an OS installer over the network. Inspects current media
    state before inserting.
  parameters:
  - name: SystemId
    type: string
    required: false
    description: System target for virtual media.
  - name: ManagerId
    type: string
    required: false
    description: Manager target for virtual media.
  - name: VirtualMediaId
    type: string
    required: false
    description: Specific virtual media device id.
  - name: ImageURI
    type: string
    required: false
    description: URI of the ISO/IMG image to mount.
  steps:
  - step_id: list_system_vm
    description: List system virtual media devices.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/VirtualMedia
    extract:
      sys_vm_members: $.Members[*].@odata.id
  - step_id: get_system_vm
    description: Read a system virtual media device's state.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/VirtualMedia/{VirtualMediaId}
    on_error: continue
    extract:
      inserted: $.Inserted
      image: $.Image
  - step_id: configure_system_vm
    description: Patch virtual media settings (e.g., WriteProtected) if requested.
    action: PATCH
    endpoint: /redfish/v1/Systems/{SystemId}/VirtualMedia/{VirtualMediaId}
    on_error: continue
    condition:
      if: configure_requested == true
      then: continue
      else: skip
    request_body:
      WriteProtected: true
  - step_id: insert_system_media
    description: Insert media on the system only if nothing is currently inserted.
    action: POST
    endpoint: /redfish/v1/Systems/{SystemId}/VirtualMedia/{VirtualMediaId}/Actions/VirtualMedia.InsertMedia
    condition:
      if: inserted == false
      then: continue
      else: goto:eject_system_media
    request_body:
      Image: '{ImageURI}'
      Inserted: true
      WriteProtected: true
    on_error: stop
  - step_id: eject_system_media
    description: Eject media from the system if requested.
    action: POST
    endpoint: /redfish/v1/Systems/{SystemId}/VirtualMedia/{VirtualMediaId}/Actions/VirtualMedia.EjectMedia
    condition:
      if: eject_requested == true
      then: continue
      else: skip
    on_error: continue
  - step_id: list_manager_vm
    description: List manager virtual media devices.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/VirtualMedia
    on_error: continue
    extract:
      mgr_vm_members: $.Members[*].@odata.id
  - step_id: get_manager_vm
    description: Read a manager virtual media device's state.
    action: GET
    endpoint: /redfish/v1/Managers/{ManagerId}/VirtualMedia/{VirtualMediaId}
    on_error: continue
    extract:
      mgr_inserted: $.Inserted
  - step_id: configure_manager_vm
    description: Patch manager virtual media settings if requested.
    action: PATCH
    endpoint: /redfish/v1/Managers/{ManagerId}/VirtualMedia/{VirtualMediaId}
    on_error: continue
    condition:
      if: configure_requested == true
      then: continue
      else: skip
    request_body:
      WriteProtected: true
  - step_id: insert_manager_media
    description: Insert media on the manager if requested.
    action: POST
    endpoint: /redfish/v1/Managers/{ManagerId}/VirtualMedia/{VirtualMediaId}/Actions/VirtualMedia.InsertMedia
    condition:
      if: insert_manager_requested == true
      then: continue
      else: skip
    request_body:
      Image: '{ImageURI}'
      Inserted: true
    on_error: stop
  - step_id: eject_manager_media
    description: Eject media on the manager if requested.
    action: POST
    endpoint: /redfish/v1/Managers/{ManagerId}/VirtualMedia/{VirtualMediaId}/Actions/VirtualMedia.EjectMedia
    condition:
      if: eject_manager_requested == true
      then: continue
      else: skip
    on_error: continue
  raw_endpoints:
  - GET /redfish/v1/Systems/{SystemId}/VirtualMedia
  - GET /redfish/v1/Systems/{SystemId}/VirtualMedia/{VirtualMediaId}
  - PATCH /redfish/v1/Systems/{SystemId}/VirtualMedia/{VirtualMediaId}
  - POST /redfish/v1/Systems/{SystemId}/VirtualMedia/{VirtualMediaId}/Actions/VirtualMedia.InsertMedia
  - POST /redfish/v1/Systems/{SystemId}/VirtualMedia/{VirtualMediaId}/Actions/VirtualMedia.EjectMedia
  - GET /redfish/v1/Managers/{ManagerId}/VirtualMedia
  - GET /redfish/v1/Managers/{ManagerId}/VirtualMedia/{VirtualMediaId}
  - PATCH /redfish/v1/Managers/{ManagerId}/VirtualMedia/{VirtualMediaId}
  - POST /redfish/v1/Managers/{ManagerId}/VirtualMedia/{VirtualMediaId}/Actions/VirtualMedia.InsertMedia
  - POST /redfish/v1/Managers/{ManagerId}/VirtualMedia/{VirtualMediaId}/Actions/VirtualMedia.EjectMedia
  output_template: '## Virtual Media

    | Property | Value |

    |----------|-------|

    | Inserted | {inserted} |

    | Image | {image} |'
- name: telemetry_metrics_collection
  category: monitoring
  description: 'Collect time-series telemetry: read the telemetry service, enumerate
    metric definitions, and pull metric reports for trending and capacity analysis.'
  parameters:
  - name: MetricDefinitionId
    type: string
    required: false
    description: Specific metric definition to inspect.
  - name: MetricReportId
    type: string
    required: false
    description: Specific metric report to retrieve.
  steps:
  - step_id: get_telemetry_service
    description: Read telemetry service config.
    action: GET
    endpoint: /redfish/v1/TelemetryService
    extract:
      min_collection_interval: $.MinCollectionInterval
  - step_id: configure_telemetry
    description: Update telemetry service config if requested.
    action: PATCH
    endpoint: /redfish/v1/TelemetryService
    on_error: continue
    condition:
      if: configure_requested == true
      then: continue
      else: skip
    request_body:
      ServiceEnabled: true
  - step_id: list_metric_definitions
    description: List metric definitions.
    action: GET
    endpoint: /redfish/v1/TelemetryService/MetricDefinitions
    extract:
      metric_def_members: $.Members[*].@odata.id
  - step_id: get_metric_definition
    description: Read each metric definition.
    action: GET
    endpoint: /redfish/v1/TelemetryService/MetricDefinitions/{MetricDefinitionId}
    loop_over: metric_def_members
    loop_variable: MetricDefinitionId
    on_error: continue
    extract:
      metric_type: $.MetricType
      units: $.Units
  - step_id: list_metric_reports
    description: List metric reports.
    action: GET
    endpoint: /redfish/v1/TelemetryService/MetricReports
    extract:
      metric_report_members: $.Members[*].@odata.id
  - step_id: get_metric_report
    description: Read each metric report's values.
    action: GET
    endpoint: /redfish/v1/TelemetryService/MetricReports/{MetricReportId}
    loop_over: metric_report_members
    loop_variable: MetricReportId
    on_error: continue
    extract:
      metric_values: $.MetricValues[*].MetricValue
  raw_endpoints:
  - GET /redfish/v1/TelemetryService
  - PATCH /redfish/v1/TelemetryService
  - GET /redfish/v1/TelemetryService/MetricDefinitions
  - GET /redfish/v1/TelemetryService/MetricDefinitions/{MetricDefinitionId}
  - GET /redfish/v1/TelemetryService/MetricReports
  - GET /redfish/v1/TelemetryService/MetricReports/{MetricReportId}
  output_template: '## Telemetry

    | Property | Value |

    |----------|-------|

    | Min Collection Interval | {min_collection_interval} |

    | Metric Type | {metric_type} |'
- name: task_management
  category: diagnostics
  description: 'Monitor and manage long-running operations (firmware updates, volume
    builds): read the task service, list tasks, poll a task''s progress, and delete/cancel
    completed or stuck tasks.'
  parameters:
  - name: TaskId
    type: string
    required: false
    description: Task to poll or delete.
  steps:
  - step_id: get_task_service
    description: Read task service overview.
    action: GET
    endpoint: /redfish/v1/TaskService
    extract:
      service_state: $.Status.State
      completed_task_policy: $.CompletedTaskOverWritePolicy
  - step_id: list_tasks
    description: List all tasks.
    action: GET
    endpoint: /redfish/v1/TaskService/Tasks
    extract:
      task_members: $.Members[*].@odata.id
  - step_id: get_task
    description: Poll each task's state and progress.
    action: GET
    endpoint: /redfish/v1/TaskService/Tasks/{TaskId}
    loop_over: task_members
    loop_variable: TaskId
    on_error: continue
    extract:
      task_state: $.TaskState
      percent_complete: $.PercentComplete
  - step_id: delete_task
    description: Delete/cancel a task only if completed or cancel was requested.
    action: DELETE
    endpoint: /redfish/v1/TaskService/Tasks/{TaskId}
    on_error: continue
    condition:
      if: task_state == 'Completed' or cancel_requested == true
      then: continue
      else: skip
  raw_endpoints:
  - GET /redfish/v1/TaskService
  - GET /redfish/v1/TaskService/Tasks
  - GET /redfish/v1/TaskService/Tasks/{TaskId}
  - DELETE /redfish/v1/TaskService/Tasks/{TaskId}
  output_template: '## Tasks

    | Property | Value |

    |----------|-------|

    | Service State | {service_state} |

    | Task State | {task_state} |

    | Percent Complete | {percent_complete} |'
- name: health_guarded_firmware_update
  category: maintenance
  description: Check server health first and only proceed with a firmware update when
    the system is healthy.
  parameters:
  - name: SystemId
    type: string
    required: true
    description: Target system identifier.
  - name: ImageURI
    type: string
    required: true
    description: Firmware image location.
  steps:
  - step_id: get_system_health
    description: Read the target system health status.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}
    extract:
      health_status: $.Status.Health
  - step_id: simple_update
    description: Trigger the update only when the server is healthy.
    action: POST
    endpoint: /redfish/v1/UpdateService/Actions/UpdateService.SimpleUpdate
    condition:
      if: health_status == 'OK'
      then: continue
      else: skip
    request_body:
      ImageURI: '{ImageURI}'
  - step_id: poll_update_service
    description: Confirm update service state after the request.
    action: GET
    endpoint: /redfish/v1/UpdateService
    extract:
      service_state: $.Status.State
  raw_endpoints:
  - GET /redfish/v1/Systems/{SystemId}
  - POST /redfish/v1/UpdateService/Actions/UpdateService.SimpleUpdate
  - GET /redfish/v1/UpdateService
  output_template: '## Firmware Update

    | Property | Value |

    |----------|-------|

    | Health | {health_status} |

    | Update Service State | {service_state} |'
- name: clear_system_logs
  category: diagnostics
  description: Inspect the log services and clear the selected system event log.
  parameters:
  - name: SystemId
    type: string
    required: true
    description: Target system identifier.
  - name: LogServiceId
    type: string
    required: false
    description: Log service to clear.
    default: SystemEventLog
  steps:
  - step_id: list_log_services
    description: List the available log services.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/LogServices
    extract:
      log_members: $.Members[*].@odata.id
  - step_id: clear_log
    description: Clear the selected log service.
    action: POST
    endpoint: /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}/Actions/LogService.ClearLog
    request_body: {}
  raw_endpoints:
  - GET /redfish/v1/Systems/{SystemId}/LogServices
  - POST /redfish/v1/Systems/{SystemId}/LogServices/{LogServiceId}/Actions/LogService.ClearLog
  output_template: '## Log Maintenance

    | Property | Value |

    |----------|-------|

    | Log Service | {LogServiceId} |'
