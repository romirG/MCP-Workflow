  - GET /redfish/v1/Systems/{SystemId}/BootOptions
  - GET /redfish/v1/Systems/{SystemId}/BootOptions/{BootOptionId}
  output_template: '## BIOS Configuration: {SystemId}

    | Property | Value |

    |----------|-------|

