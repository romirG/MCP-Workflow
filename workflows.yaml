meta:
  spec_source: DMTF Redfish API
  generated_by: claude
  total_workflows: 21
  total_raw_endpoints: 133
  schema_extensions:
    note: 'The following optional fields extend the base schema. They are backward-compatible:
      a runtime that does not understand them can ignore them and the workflow still
      executes correctly as a linear/branching step list.'
    break_if: Optional string on a step that has loop_over. A boolean expression over
      extracted variables; when it evaluates true the runtime stops iterating the
      loop early (e.g., stop scanning drives once a fault is found).
    next_workflows: 'Optional list at the workflow level suggesting follow-on workflows
      for cross-workflow chaining. Each item: {workflow: <name>, if: <condition expr>,
      reason: <text>}. The orchestrator MAY invoke the named workflow when the condition
      holds. This is advisory chaining, not an automatic call.'
workflows:
- name: discover_service_root
  category: monitoring
  description: Query the Redfish service root to discover the API version and the
    top-level service links (Systems, Chassis, Managers, etc.). Usually the first
    call when connecting to a new BMC.
  parameters: []
  steps:
  - step_id: get_root
    description: Fetch the Redfish service root document.
    action: GET
    endpoint: /redfish/v1
    extract:
      redfish_version: $.RedfishVersion
      systems_uri: $.Systems.@odata.id
      chassis_uri: $.Chassis.@odata.id
      managers_uri: $.Managers.@odata.id
  raw_endpoints:
  - GET /redfish/v1
  output_template: '## Redfish Service Root

    | Property | Value |

    |----------|-------|

    | Redfish Version | {redfish_version} |

    | Systems | {systems_uri} |

    | Chassis | {chassis_uri} |

    | Managers | {managers_uri} |'
- name: server_health_check
  category: monitoring
  description: 'Run a top-to-bottom health assessment of a server: overall status,
    power state, and processor/memory health. If overall health is not OK, it automatically
    drills into chassis thermal data to look for a root cause.'
  parameters:
  - name: SystemId
    type: string
    required: false
    description: Target system identifier. If omitted, the first system in the collection
      is used.
    default: first member of /redfish/v1/Systems
  - name: ChassisId
    type: string
    required: false
    description: Chassis to inspect for thermal data when health is degraded.
    default: first member of /redfish/v1/Chassis
  steps:
  - step_id: list_systems
    description: List all computer systems.
    action: GET
    endpoint: /redfish/v1/Systems
    extract:
      system_members: $.Members[*].@odata.id
      system_count: $.Members@odata.count
  - step_id: get_system
    description: Retrieve the target system instance.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}
    extract:
      health_status: $.Status.Health
      power_state: $.PowerState
      cpu_summary_health: $.ProcessorSummary.Status.Health
      mem_summary_health: $.MemorySummary.Status.Health
  - step_id: list_processors
    description: 'Deep dive: list processors. Skipped entirely (jump to summary) when
      overall health is already OK, so a clean server returns after just two calls.'
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Processors
    condition:
      if: health_status != 'OK'
      then: continue
      else: goto:summary
    extract:
      processor_members: $.Members[*].@odata.id
  - step_id: get_processor
    description: Read each processor's health. Stops looping as soon as a faulty CPU
      is found (the cause is identified).
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Processors/{ProcessorId}
    loop_over: processor_members
    loop_variable: ProcessorId
    on_error: continue
    break_if: processor_health != 'OK'
    extract:
      processor_health: $.Status.Health
  - step_id: list_memory
    description: List memory modules.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Memory
    extract:
      memory_members: $.Members[*].@odata.id
  - step_id: get_memory
    description: Read each memory module's health. Stops looping once a faulty DIMM
      is found.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Memory/{MemoryId}
    loop_over: memory_members
    loop_variable: MemoryId
    on_error: continue
    break_if: memory_health != 'OK'
    extract:
      memory_health: $.Status.Health
  - step_id: check_thermal
    description: Only when overall health is degraded, pull chassis thermal data to
      find hotspots.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/Thermal
    condition:
      if: health_status != 'OK'
      then: continue
      else: skip
    extract:
      temperatures: $.Temperatures[*].ReadingCelsius
      fan_health: $.Fans[*].Status.Health
  - step_id: summary
    description: Terminal reporting step and jump target for the healthy fast-path.
      Always reachable; performs no extra I/O.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}
    extract:
      final_health: $.Status.Health
  next_workflows:
  - workflow: log_collection
    if: health_status != 'OK'
    reason: Pull system/manager logs to root-cause a degraded server.
  - workflow: thermal_and_power_monitoring
    if: health_status != 'OK'
    reason: Inspect full sensor/fan/PSU detail when health is degraded.
  - workflow: firmware_update
    if: health_status == 'Warning'
    reason: A faulty component may need a firmware remediation.
  raw_endpoints:
  - GET /redfish/v1/Systems
  - GET /redfish/v1/Systems/{SystemId}
  - GET /redfish/v1/Systems/{SystemId}/Processors
  - GET /redfish/v1/Systems/{SystemId}/Processors/{ProcessorId}
  - GET /redfish/v1/Systems/{SystemId}/Memory
  - GET /redfish/v1/Systems/{SystemId}/Memory/{MemoryId}
  - GET /redfish/v1/Chassis/{ChassisId}/Thermal
  output_template: '## Server Health: {SystemId}

    | Property | Value |

    |----------|-------|

    | Overall Health | {health_status} |

    | Power State | {power_state} |

    | CPU Summary | {cpu_summary_health} |

    | Memory Summary | {mem_summary_health} |'
- name: hardware_inventory_report
  category: monitoring
  description: 'Produce a full asset/inventory report for a server: CPUs, memory,
    PCIe devices and their functions, network interfaces, simple storage, and chassis-level
    FRU/assembly and network adapter data.'
  parameters:
  - name: SystemId
    type: string
    required: true
    description: Target system identifier.
  - name: ChassisId
    type: string
    required: false
    description: Chassis to pull FRU/assembly and network adapter data from.
    default: first member of /redfish/v1/Chassis
  steps:
  - step_id: get_system
    description: Get system to read model, serial, and manufacturer.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}
    extract:
      model: $.Model
      serial: $.SerialNumber
      manufacturer: $.Manufacturer
  - step_id: list_pcie
    description: List PCIe devices.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/PCIeDevices
    extract:
      pcie_members: $.Members[*].@odata.id
  - step_id: get_pcie_device
    description: Read each PCIe device.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/PCIeDevices/{PCIeDeviceId}
    loop_over: pcie_members
    loop_variable: PCIeDeviceId
    on_error: continue
    extract:
      pcie_name: $.Name
      function_members: $.PCIeFunctions[*].@odata.id
  - step_id: list_pcie_functions
    description: List functions for the device.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/PCIeDevices/{PCIeDeviceId}/PCIeFunctions
    on_error: continue
    extract:
      function_member_ids: $.Members[*].@odata.id
  - step_id: get_pcie_function
    description: Read a specific PCIe function.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/PCIeDevices/{PCIeDeviceId}/PCIeFunctions/{FunctionId}
    on_error: continue
    extract:
      function_type: $.DeviceClass
  - step_id: list_network_interfaces
    description: List system network interfaces.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/NetworkInterfaces
    extract:
      netif_members: $.Members[*].@odata.id
  - step_id: list_simple_storage
    description: List simple storage controllers.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/SimpleStorage
    extract:
      simple_storage_members: $.Members[*].@odata.id
  - step_id: get_simple_storage
    description: Read each simple storage instance.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/SimpleStorage/{SimpleStorageId}
    loop_over: simple_storage_members
    loop_variable: SimpleStorageId
    on_error: continue
    extract:
      devices: $.Devices[*].Name
  - step_id: get_assembly
    description: Read chassis assembly (FRU) data.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/Assembly
    extract:
      assemblies: $.Assemblies[*].Name
  - step_id: list_network_adapters
    description: List chassis network adapters.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/NetworkAdapters
    extract:
      adapter_members: $.Members[*].@odata.id
  - step_id: get_network_adapter
    description: Read each network adapter.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/NetworkAdapters/{NetworkAdapterId}
    loop_over: adapter_members
    loop_variable: NetworkAdapterId
    on_error: continue
    extract:
      adapter_model: $.Model
  raw_endpoints:
  - GET /redfish/v1/Systems/{SystemId}
  - GET /redfish/v1/Systems/{SystemId}/PCIeDevices
  - GET /redfish/v1/Systems/{SystemId}/PCIeDevices/{PCIeDeviceId}
  - GET /redfish/v1/Systems/{SystemId}/PCIeDevices/{PCIeDeviceId}/PCIeFunctions
  - GET /redfish/v1/Systems/{SystemId}/PCIeDevices/{PCIeDeviceId}/PCIeFunctions/{FunctionId}
  - GET /redfish/v1/Systems/{SystemId}/NetworkInterfaces
  - GET /redfish/v1/Systems/{SystemId}/SimpleStorage
  - GET /redfish/v1/Systems/{SystemId}/SimpleStorage/{SimpleStorageId}
  - GET /redfish/v1/Chassis/{ChassisId}/Assembly
  - GET /redfish/v1/Chassis/{ChassisId}/NetworkAdapters
  - GET /redfish/v1/Chassis/{ChassisId}/NetworkAdapters/{NetworkAdapterId}
  output_template: '## Hardware Inventory: {SystemId}

    | Component | Value |

    |----------|-------|

    | Model | {model} |

    | Serial | {serial} |

    | Manufacturer | {manufacturer} |'
- name: thermal_and_power_monitoring
  category: monitoring
  description: 'Monitor environmental health of a chassis: temperatures, fans, sensors,
    power supplies, batteries, and aggregate power/energy consumption. Flags any component
    whose status is not OK.'
  parameters:
  - name: ChassisId
    type: string
    required: false
    description: Target chassis identifier. If omitted, every chassis in the collection
      is evaluated.
    default: all members of /redfish/v1/Chassis
  - name: Detail
    type: string
    required: false
    description: Set to 'full' to always enumerate every sensor/fan/PSU/battery. When
      'summary' (default), per-component loops are skipped if the chassis is healthy.
    default: summary
  steps:
  - step_id: list_chassis
    description: List all chassis to evaluate.
    action: GET
    endpoint: /redfish/v1/Chassis
    extract:
      chassis_members: $.Members[*].@odata.id
  - step_id: get_chassis
    description: Read each chassis instance (model, health, indicator LED).
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}
    loop_over: chassis_members
    loop_variable: ChassisId
    on_error: continue
    extract:
      chassis_health: $.Status.Health
      chassis_model: $.Model
  - step_id: set_indicator_led
    description: Optionally set the chassis identify/indicator LED (e.g., to physically
      locate a hot node).
    action: PATCH
    endpoint: /redfish/v1/Chassis/{ChassisId}
    on_error: continue
    condition:
      if: set_led_requested == true
      then: continue
      else: skip
    request_body:
      LocationIndicatorActive: '{led_flag}'
  - step_id: get_power
    description: Read chassis power (voltages, consumption, supplies).
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/Power
    extract:
      power_consumed_watts: $.PowerControl[0].PowerConsumedWatts
  - step_id: set_power_cap
    description: Optionally apply a power cap / power limit on the chassis.
    action: PATCH
    endpoint: /redfish/v1/Chassis/{ChassisId}/Power
    on_error: continue
    condition:
      if: set_power_cap_requested == true
      then: continue
      else: skip
    request_body:
      PowerControl:
      - PowerLimit:
          LimitInWatts: '{power_limit_watts}'
  - step_id: get_env_metrics
    description: Read aggregate environmental metrics.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/EnvironmentMetrics
    extract:
      power_watts: $.PowerWatts.Reading
      temp_celsius: $.TemperatureCelsius.Reading
  - step_id: get_thermal
    description: Read thermal block (temps + fans).
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/Thermal
    extract:
      max_temp: $.Temperatures[*].ReadingCelsius
      fan_health: $.Fans[*].Status.Health
  - step_id: set_fan_policy
    description: Optionally adjust thermal/fan settings (e.g., a fan offset or redundancy
      mode).
    action: PATCH
    endpoint: /redfish/v1/Chassis/{ChassisId}/Thermal
    on_error: continue
    condition:
      if: set_fan_policy_requested == true
      then: continue
      else: skip
    request_body:
      Fans: '{fan_settings}'
  - step_id: list_sensors
    description: List all sensors. Skipped (jump to summary) on a healthy chassis
      unless Detail='full', avoiding a long per-sensor loop.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/Sensors
    condition:
      if: chassis_health != 'OK' or Detail == 'full'
      then: continue
      else: goto:summary
    extract:
      sensor_members: $.Members[*].@odata.id
  - step_id: get_sensor
    description: Read each sensor reading.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/Sensors/{SensorId}
    loop_over: sensor_members
    loop_variable: SensorId
    on_error: continue
    extract:
      sensor_reading: $.Reading
      sensor_health: $.Status.Health
  - step_id: list_fans
    description: List fans in the thermal subsystem.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/ThermalSubsystem/Fans
    extract:
      fan_members: $.Members[*].@odata.id
  - step_id: get_fan
    description: Read each fan.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/ThermalSubsystem/Fans/{FanId}
    loop_over: fan_members
    loop_variable: FanId
    on_error: continue
    extract:
      fan_speed: $.SpeedPercent.Reading
  - step_id: list_power_supplies
    description: List power supplies.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/PowerSubsystem/PowerSupplies
    extract:
      psu_members: $.Members[*].@odata.id
  - step_id: get_power_supply
    description: Read each power supply.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/PowerSubsystem/PowerSupplies/{PowerSupplyId}
    loop_over: psu_members
    loop_variable: PowerSupplyId
    on_error: continue
    extract:
      psu_health: $.Status.Health
  - step_id: list_batteries
    description: List batteries.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/PowerSubsystem/Batteries
    extract:
      battery_members: $.Members[*].@odata.id
  - step_id: get_battery
    description: Read each battery.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/PowerSubsystem/Batteries/{BatteryId}
    loop_over: battery_members
    loop_variable: BatteryId
    on_error: continue
    extract:
      battery_soh: $.StateOfHealthPercent.Reading
  - step_id: summary
    description: Terminal reporting step and jump target for the healthy fast-path.
      No extra I/O beyond a chassis re-read.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}
    extract:
      final_chassis_health: $.Status.Health
  next_workflows:
  - workflow: log_collection
    if: chassis_health != 'OK'
    reason: Collect chassis/manager logs when an environmental fault is detected.
  raw_endpoints:
  - GET /redfish/v1/Chassis
  - GET /redfish/v1/Chassis/{ChassisId}
  - PATCH /redfish/v1/Chassis/{ChassisId}
  - GET /redfish/v1/Chassis/{ChassisId}/Power
  - PATCH /redfish/v1/Chassis/{ChassisId}/Power
  - GET /redfish/v1/Chassis/{ChassisId}/EnvironmentMetrics
  - GET /redfish/v1/Chassis/{ChassisId}/Thermal
  - PATCH /redfish/v1/Chassis/{ChassisId}/Thermal
  - GET /redfish/v1/Chassis/{ChassisId}/Sensors
  - GET /redfish/v1/Chassis/{ChassisId}/Sensors/{SensorId}
  - GET /redfish/v1/Chassis/{ChassisId}/ThermalSubsystem/Fans
  - GET /redfish/v1/Chassis/{ChassisId}/ThermalSubsystem/Fans/{FanId}
  - GET /redfish/v1/Chassis/{ChassisId}/PowerSubsystem/PowerSupplies
  - GET /redfish/v1/Chassis/{ChassisId}/PowerSubsystem/PowerSupplies/{PowerSupplyId}
  - GET /redfish/v1/Chassis/{ChassisId}/PowerSubsystem/Batteries
  - GET /redfish/v1/Chassis/{ChassisId}/PowerSubsystem/Batteries/{BatteryId}
  output_template: '## Thermal & Power: {ChassisId}

    | Metric | Value |

    |----------|-------|

    | Power Consumed (W) | {power_consumed_watts} |

    | Temperature (C) | {temp_celsius} |'
- name: storage_management
  category: configuration
  description: 'Inventory and manage storage: enumerate storage subsystems, drives
    and volumes, and create, modify, or delete volumes. Loops over every drive and
    continues even if an individual drive read fails.'
  parameters:
  - name: SystemId
    type: string
    required: true
    description: Target system identifier.
  - name: StorageId
    type: string
    required: false
    description: Storage subsystem to act on (required for volume create/delete).
  - name: VolumeId
    type: string
    required: false
    description: Volume to modify or delete.
  - name: ChassisId
    type: string
    required: false
    description: Chassis to enumerate physical drives from.
  steps:
  - step_id: list_storage
    description: List storage subsystems.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Storage
    extract:
      storage_members: $.Members[*].@odata.id
  - step_id: get_storage
    description: Read each storage subsystem and its drive links.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Storage/{StorageId}
    loop_over: storage_members
    loop_variable: StorageId
    on_error: continue
    extract:
      drive_links: $.Drives[*].@odata.id
  - step_id: get_drive
    description: Read each drive; continue past failures.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Drives/{DriveId}
    loop_over: drive_links
    loop_variable: DriveId
    on_error: continue
    extract:
      drive_health: $.Status.Health
      drive_capacity: $.CapacityBytes
  - step_id: list_volumes
    description: List volumes in the subsystem.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes
    extract:
      volume_members: $.Members[*].@odata.id
  - step_id: get_volume
    description: Read a specific volume.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes/{VolumeId}
    on_error: continue
    extract:
      volume_raid: $.RAIDType
      volume_capacity: $.CapacityBytes
  - step_id: create_volume
    description: Create a new volume (only if creation was requested).
    action: POST
    endpoint: /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes
    condition:
      if: create_requested == true
      then: continue
      else: skip
    request_body:
      RAIDType: '{raid_type}'
      CapacityBytes: '{capacity_bytes}'
      Drives: '{drive_links}'
    extract:
      new_volume_uri: $.@odata.id
  - step_id: modify_volume
    description: Modify an existing volume.
    action: PATCH
    endpoint: /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes/{VolumeId}
    on_error: stop
    request_body:
      Name: '{new_volume_name}'
  - step_id: delete_volume
    description: Delete a volume (only if deletion was requested).
    action: DELETE
    endpoint: /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes/{VolumeId}
    condition:
      if: delete_requested == true
      then: continue
      else: skip
    on_error: stop
  - step_id: list_chassis_drives
    description: List physical drives at the chassis level.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/Drives
    extract:
      chassis_drive_members: $.Members[*].@odata.id
  - step_id: get_chassis_drive
    description: Read each chassis drive.
    action: GET
    endpoint: /redfish/v1/Chassis/{ChassisId}/Drives/{DriveId}
    loop_over: chassis_drive_members
    loop_variable: DriveId
    on_error: continue
    extract:
      chassis_drive_health: $.Status.Health
  raw_endpoints:
  - GET /redfish/v1/Systems/{SystemId}/Storage
  - GET /redfish/v1/Systems/{SystemId}/Storage/{StorageId}
  - GET /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Drives/{DriveId}
  - GET /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes
  - POST /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes
  - GET /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes/{VolumeId}
  - PATCH /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes/{VolumeId}
  - DELETE /redfish/v1/Systems/{SystemId}/Storage/{StorageId}/Volumes/{VolumeId}
  - GET /redfish/v1/Chassis/{ChassisId}/Drives
  - GET /redfish/v1/Chassis/{ChassisId}/Drives/{DriveId}
  output_template: '## Storage: {SystemId}

    | Item | Value |

    |----------|-------|

    | Volume RAID | {volume_raid} |

    | Volume Capacity | {volume_capacity} |

    | New Volume | {new_volume_uri} |'
  next_workflows:
  - workflow: task_management
    if: new_volume_uri != null
    reason: Volume creation is often asynchronous; track the resulting build task.
- name: server_power_operations
  category: lifecycle
  description: Perform power control on a server (On, GracefulShutdown, ForceOff,
    GracefulRestart, ForceRestart). Reads current power state first and skips the
    reset if the server is already in the desired state.
  parameters:
  - name: SystemId
    type: string
    required: true
    description: Target system identifier.
  - name: ResetType
    type: string
    required: true
    description: 'Reset action: On, ForceOff, GracefulShutdown, GracefulRestart, ForceRestart,
      PowerCycle.'
    default: GracefulRestart
  steps:
  - step_id: get_system
    description: Read current power state.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}
    extract:
      power_state: $.PowerState
  - step_id: reset_system
    description: Issue the reset action unless already powered on and requesting On.
    action: POST
    endpoint: /redfish/v1/Systems/{SystemId}/Actions/ComputerSystem.Reset
    condition:
      if: power_state == 'On' and ResetType == 'On'
      then: skip
      else: continue
    request_body:
      ResetType: '{ResetType}'
    on_error: stop
  - step_id: patch_system
    description: Optionally update boot override settings alongside the power action.
    action: PATCH
    endpoint: /redfish/v1/Systems/{SystemId}
    on_error: continue
    request_body:
      Boot:
        BootSourceOverrideTarget: '{boot_target}'
  raw_endpoints:
  - GET /redfish/v1/Systems/{SystemId}
  - PATCH /redfish/v1/Systems/{SystemId}
  - POST /redfish/v1/Systems/{SystemId}/Actions/ComputerSystem.Reset
  output_template: '## Power Operation: {SystemId}

    | Property | Value |

    |----------|-------|

    | Previous State | {power_state} |

    | Action Issued | {ResetType} |'
- name: bios_configuration
  category: configuration
  description: 'View and manage BIOS: read current attributes and boot options, modify
    attributes, change the BIOS password, or reset BIOS to factory defaults.'
  parameters:
  - name: SystemId
    type: string
    required: true
    description: Target system identifier.
  - name: BootOptionId
    type: string
    required: false
    description: Specific boot option to inspect.
  steps:
  - step_id: get_bios
    description: Read current BIOS attributes.
    action: GET
    endpoint: /redfish/v1/Systems/{SystemId}/Bios
    extract:
      attributes: $.Attributes
      boot_mode: $.Attributes.BootMode
  - step_id: list_boot_options
    description: List boot options.
    action: GET
